<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retro Duck Hunt Group Maker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="manifest" href="manifest.json">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
        body { margin: 0; overflow: hidden; background-color: #000;font-family: 'Press Start 2P', cursive;  user-select: none; color: white; }
        canvas { display: block; image-rendering: pixelated; background-image: url('bg_field.gif'); background-size: cover; background-position: center; background-repeat: no-repeat; background-attachment: fixed; width: 100vw; height: 100vh; }
        .retro-panel { background: #000000b4; border: 4px solid #fff; padding: 20px; box-shadow: 8px 8px 0px #555; }
        .retro-input { background: #222; border: 2px solid #fff; color: #0f0; padding: 10px; font-family: monospace; outline: none; }
        .retro-btn { background: #ff5722; color: white; padding: 10px 20px; border: 4px solid #bf360c; font-family: 'Press Start 2P', cursive; font-size: 10px; cursor: pointer; transition: transform 0.1s; }
        .retro-btn:active { transform: translateY(4px); box-shadow: none; }
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; pointer-events: none; }
        #setup-screen, #summary-screen, #zoom-modal { pointer-events: auto; z-index: 100; }
        .hidden { display: none !important; }
        #group-display { position: absolute; bottom: 20px; left: 20px; right: 20px; display: flex; gap: 10px; pointer-events: auto; }
        .group-box { background: rgba(0,0,0,0.8); border: 2px solid #fff; padding: 10px; flex: 1; font-size: 8px; max-height: 180px; overflow-y: auto; cursor: zoom-in; transition: transform 0.2s; }
        .active-group { border-color: #ffeb3b; box-shadow: 0 0 15px #ffeb3b; }
        #announcement { position: absolute; top: 20%; font-size: 24px; color: #ffeb3b; text-shadow: 4px 4px #000; text-align: center; pointer-events: none; z-index: 200; }
        #zoom-modal { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: flex; align-items: center; justify-content: center; z-index: 1000; }
        .floating-back-btn { position: fixed; top: 20px; left: 20px; z-index: 9999; background: #555; color: white; padding: 10px 15px; border: 4px solid #333; font-size: 10px; text-decoration: none; display: inline-block; }
    </style>
</head>
<body>

    <a href="viewer.html" class="floating-back-btn">&lt; BACK</a>
    <canvas id="gameCanvas"></canvas>

    <div id="ui-layer">
        <div id="setup-screen" class="retro-panel max-w-lg w-full text-center">
            <h1 class="text-xl mb-6 text-yellow-400">DUCK GROUPER PRO</h1>
            <div class="mb-4 text-left">
                <label class="text-[10px] block mb-2 text-blue-400">SESSION STATUS</label>
                <div id="save-status" class="text-[8px] mb-2 text-gray-400">Ready to Hunt.</div>
                <label class="text-[10px] block mb-2">NAMES (ONE PER LINE)</label>
                <textarea id="names-input" class="retro-input w-full h-32" placeholder="ALICE&#10;BOB..."></textarea>
            </div>
            <div class="mb-6 text-left flex gap-4">
                <div class="flex-1">
                    <label class="text-[10px] block mb-2">GROUPS</label>
                    <input type="number" id="group-count" value="2" min="1" class="retro-input w-full">
                </div>
                <div class="flex-1 flex items-end">
                    <button onclick="loadFromStorage()" class="retro-btn w-full bg-blue-600 border-blue-800">LOAD LAST</button>
                </div>
            </div>
            <button onclick="initGame()" class="retro-btn w-full text-lg">START FIELD</button>
        </div>

        <div id="announcement" class="hidden"></div>
        <div id="group-display" class="hidden"></div>

        <div id="controls" class="hidden absolute bottom-52 pointer-events-auto flex flex-col items-center gap-4">
            <div id="hunt-status" class="text-[10px] bg-black/50 p-2 border border-white hidden">HUNTING...</div>
            <button id="hunt-btn" onclick="triggerHunt()" class="retro-btn py-4 px-8 text-lg">START HUNT</button>
            <button id="next-group-btn" onclick="nextGroup()" class="hidden retro-btn py-4 px-8 text-lg bg-blue-600 border-blue-800">NEXT GROUP</button>
            <button id="finish-btn" onclick="showSummary()" class="hidden retro-btn py-4 px-8 text-lg bg-green-600 border-green-800">SUMMARY</button>
        </div>

        <div id="summary-screen" class="hidden retro-panel max-w-2xl w-full">
            <h2 id="summary-title" class="text-xl mb-4 text-center text-yellow-400">FINAL ROSTER</h2>
            <div id="summary-list" class="grid grid-cols-2 gap-4 mb-6 max-h-80 overflow-y-auto p-2"></div>
            <div class="flex gap-4">
                <button onclick="exportToCSV()" class="retro-btn flex-1 bg-green-600 border-green-800">CSV</button>
                <button onclick="location.reload()" class="retro-btn flex-1">RESET</button>
            </div>
        </div>
        
        <!-- Zoom Modal from GroupMakerV2 -->
        <div id="zoom-modal" class="hidden" onclick="this.classList.add('hidden')">
            <div class="retro-panel max-w-md w-full text-center">
                <h2 id="zoom-title" class="text-xl mb-4 text-yellow-400"></h2>
                <div id="zoom-content" class="text-lg leading-loose space-y-2"></div>
                <p class="mt-6 text-[8px] text-gray-500">CLICK ANYWHERE TO CLOSE</p>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        let audioCtx;
        
        let names = [];
        let groups = [];
        let ducks = [];
        let currentGroupIdx = 0;
        let reticle = { x: 0, y: 0, target: null, active: false, locking: false };
        let animationId;
        let musicTicker = 0;
        let isAutoHunting = false;
        let targetGroupSize = 0;

        // Music Logic
        const bgMusic = new Audio('bg_music.mp3');
        bgMusic.loop = true;
        bgMusic.volume = 0.4;

        function initAudio() { if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }

        function playSound(freq, type, duration, vol = 0.1) {
            if(!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = type; osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            gain.connect(audioCtx.destination); osc.connect(gain);
            gain.gain.setValueAtTime(vol, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
            osc.start(); osc.stop(audioCtx.currentTime + duration);
        }

        class Duck {
            constructor(name) {
                this.name = name; this.isDead = false; this.facingRight = true; this.scale = 2.0; this.reset();
                this.y = canvas.height + 50;
            }
            reset() {
                this.x = Math.random() * canvas.width;
                this.targetX = Math.random() * canvas.width;
                this.targetY = Math.random() * (canvas.height * 0.6);
                this.speed = 1.8 + Math.random() * 2.5; this.flap = 0;
            }
            update() {
                if (this.isDead) { this.y += 18; return; }
                const dx = this.targetX - this.x; const dy = this.targetY - this.y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                if (Math.abs(dx) > 0.5) this.facingRight = dx > 0;
                if (dist < 10) { this.targetX = Math.random() * canvas.width; this.targetY = Math.random() * (canvas.height * 0.6); }
                else { this.x += (dx / dist) * this.speed; this.y += (dy / dist) * this.speed; }
                this.flap += 0.25;
            }
            draw() {
                ctx.save(); ctx.translate(this.x, this.y); const s = this.scale;
                if (!this.facingRight) ctx.scale(-1, 1);
                if (!this.isDead) {
                    ctx.save(); if (!this.facingRight) ctx.scale(-1, 1);
                    ctx.fillStyle = 'black'; ctx.font = `${8 * (s/2)}px monospace`;
                    const tw = ctx.measureText(this.name).width;
                    ctx.fillRect(-tw/2 - 2, -18 * s - 15, tw + 4, 12);
                    ctx.fillStyle = 'white'; ctx.fillText(this.name, -tw/2, -18 * s - 6);
                    ctx.restore();
                }
                ctx.fillStyle = this.isDead ? '#f44336' : '#6d4c41'; ctx.fillRect(-15 * s, -10 * s, 30 * s, 15 * s);
                ctx.fillStyle = '#2e7d32'; ctx.fillRect(5 * s, -18 * s, 12 * s, 10 * s);
                ctx.fillStyle = '#ffeb3b'; ctx.fillRect(15 * s, -15 * s, 8 * s, 4 * s);
                const wingPos = (Math.sin(this.flap) * 10) * (s/2);
                ctx.fillStyle = '#8d6e63'; ctx.fillRect(-8 * s, (-10 * s) + wingPos, 16 * s, 8 * s);
                ctx.restore();
            }
        }

        function initGame(syncedNames = null) {
            initAudio();
            const groupCountInput = document.getElementById('group-count').value;
            const numGroups = parseInt(groupCountInput) || 2;
            const rawNamesInput = document.getElementById('names-input').value.split('\n').filter(n => n.trim());
            
            if (syncedNames) { names = syncedNames; } 
            else { names = rawNamesInput.sort(() => Math.random() - 0.5); }

            if (names.length === 0) return;

            groups = Array.from({ length: numGroups }, () => []);
            targetGroupSize = Math.floor(names.length / numGroups);
            ducks = names.map(n => new Duck(n));

            document.getElementById('setup-screen').classList.add('hidden');
            document.getElementById('group-display').classList.remove('hidden');
            document.getElementById('controls').classList.remove('hidden');
            
            updateGroupUI();
            resize();
            gameLoop();
            announce(`ROUND 1: GROUP 1`);
        }

        function updateGroupUI() {
            const container = document.getElementById('group-display');
            container.innerHTML = '';
            groups.forEach((g, i) => {
                const div = document.createElement('div');
                div.className = `group-box ${i === currentGroupIdx ? 'active-group' : ''}`;
                div.onclick = () => zoomGroup(i);
                div.innerHTML = `<div class="text-yellow-400 mb-1 border-b border-white/20 pb-1">G${i+1}</div>` + 
                                g.map(m => `<div class="py-1"> ${m}</div>`).join('');
                container.appendChild(div);
            });
        }

        function zoomGroup(idx) {
            const modal = document.getElementById('zoom-modal');
            const title = document.getElementById('zoom-title');
            const content = document.getElementById('zoom-content');
            title.innerText = `GROUP ${idx + 1}`;
            content.innerHTML = groups[idx].map(n => `<div>${n}</div>`).join('');
            modal.classList.remove('hidden');
        }

        function announce(text) {
            const el = document.getElementById('announcement');
            el.innerText = text; el.classList.remove('hidden');
            setTimeout(() => el.classList.add('hidden'), 2000);
            playSound(523.25, 'square', 0.2);
        }

        async function triggerHunt() {
            if (reticle.active || ducks.filter(d => !d.isDead).length === 0) return;
            isAutoHunting = true;
            document.getElementById('hunt-btn').classList.add('hidden');
            document.getElementById('hunt-status').classList.remove('hidden');
            await performHuntCycle();
        }

        async function performHuntCycle() {
            const alive = ducks.filter(d => !d.isDead);
            if (alive.length === 0) return;

            reticle.active = true; reticle.locking = false;
            const switches = 3 + Math.floor(Math.random() * 3);
            for (let i = 0; i < switches; i++) {
                const targets = ducks.filter(d => !d.isDead);
                reticle.target = targets[Math.floor(Math.random() * targets.length)];
                playSound(300 + (i * 50), 'sawtooth', 0.1, 0.05);
                await new Promise(r => setTimeout(r, 800));
            }

            reticle.locking = true;
            playSound(800, 'square', 0.1, 0.1);
            await new Promise(r => setTimeout(r, 600));
            shoot();
            await new Promise(r => setTimeout(r, 1000));
            
            const isLastGroup = currentGroupIdx === groups.length - 1;
            const currentSize = groups[currentGroupIdx].length;
            const remainingDucks = ducks.filter(d => !d.isDead).length;

            if (!isLastGroup && currentSize < targetGroupSize) await performHuntCycle();
            else if (isLastGroup && remainingDucks > 0) await performHuntCycle();
            else {
                isAutoHunting = false;
                document.getElementById('hunt-status').classList.add('hidden');
                checkRoundEnd();
            }
        }

        function shoot() {
            playSound(100, 'square', 0.2, 0.4);
            if (reticle.target) {
                reticle.target.isDead = true;
                groups[currentGroupIdx].push(reticle.target.name);
                updateGroupUI();
            }
            reticle.active = false; reticle.target = null;
        }

        function checkRoundEnd() {
            const aliveCount = ducks.filter(d => !d.isDead).length;
            const isLastGroup = currentGroupIdx === groups.length - 1;
            if (aliveCount === 0) {
                document.getElementById('finish-btn').classList.remove('hidden');
                announce("HUNT COMPLETE!");
            } else if (!isLastGroup) {
                document.getElementById('next-group-btn').classList.remove('hidden');
                announce("GROUP FULL!");
            } else {
                document.getElementById('hunt-btn').classList.remove('hidden');
            }
        }

        function nextGroup() {
            currentGroupIdx++;
            document.getElementById('next-group-btn').classList.add('hidden');
            document.getElementById('hunt-btn').classList.remove('hidden');
            updateGroupUI();
            announce(`GROUP ${currentGroupIdx + 1}`);
        }

        function gameLoop() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ducks.forEach(d => { d.update(); d.draw(); });
            if (reticle.active && reticle.target) {
                const lerp = reticle.locking ? 0.3 : 0.05;
                reticle.x += (reticle.target.x - reticle.x) * lerp;
                reticle.y += (reticle.target.y - reticle.y) * lerp;
                ctx.save();
                const gradient = ctx.createRadialGradient(reticle.x, reticle.y, 40, reticle.x, reticle.y, canvas.width / 1.5);
                gradient.addColorStop(0, 'rgba(0, 0, 0, 0)'); gradient.addColorStop(1, 'rgba(0, 0, 0, 0.9)');
                ctx.fillStyle = gradient; ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.strokeStyle = reticle.locking ? (Math.floor(Date.now()/100)%2 ? '#39FF14' : 'red') : '#39FF14';
                ctx.lineWidth = 4; ctx.beginPath(); ctx.arc(reticle.x, reticle.y, 40, 0, Math.PI*2);
                ctx.moveTo(reticle.x - 60, reticle.y); ctx.lineTo(reticle.x + 60, reticle.y);
                ctx.moveTo(reticle.x, reticle.y - 60); ctx.lineTo(reticle.x, reticle.y + 60);
                ctx.stroke(); ctx.restore();
            }
            animationId = requestAnimationFrame(gameLoop);
        }

        function saveToStorage() {
            const data = { names, groups, currentGroupIdx, config: { count: document.getElementById('group-count').value } };
            localStorage.setItem('duck_hunt_save', JSON.stringify(data));
        }

        function loadFromStorage() {
            const saved = localStorage.getItem('duck_hunt_save');
            if (saved) {
                const data = JSON.parse(saved);
                document.getElementById('names-input').value = (data.names || []).join('\n');
                document.getElementById('group-count').value = data.config.count;
                document.getElementById('save-status').innerText = "Data loaded!";
            }
        }

        function exportToCSV() {
            let csv = "Group,Member\n";
            groups.forEach((g, i) => { g.forEach(m => { csv += `Group ${i+1},"${m}"\n`; }); });
            const blob = new Blob([csv], { type: 'text/csv' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url; a.download = 'duck_groups.csv';
            document.body.appendChild(a); a.click(); document.body.removeChild(a);
        }

        function showSummary() {
            cancelAnimationFrame(animationId);
            document.getElementById('controls').classList.add('hidden');
            document.getElementById('group-display').classList.add('hidden');
            document.getElementById('summary-screen').classList.remove('hidden');
            const list = document.getElementById('summary-list');
            list.innerHTML = '';
            groups.forEach((g, i) => {
                const div = document.createElement('div');
                div.className = "retro-input h-auto text-[10px]";
                div.innerHTML = `<strong class="text-yellow-400">GROUP ${i+1}</strong><br>` + g.join('<br>');
                list.appendChild(div);
            });
        }

        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.addEventListener('resize', resize);
        
        // SYNC LOGIC
        const syncChannel = new BroadcastChannel('duck_hunt_controls');
        const isIframe = (window.self !== window.top);

        syncChannel.onmessage = (event) => {
            const data = event.data;
            if (data.type === 'SYNC_GAME_START' && isIframe) initGame(data.names);
            if (data === 'START_HUNT') triggerHunt();
            if (data === 'NEXT') nextGroup();
            if (data === 'RELOAD') location.reload();
            if (data === 'GO_HOME') window.location.href = 'viewer.html';
            if (data.type === 'NAVIGATE') window.location.href = data.url;
            if (data === 'TOGGLE_MUSIC') {
                if (bgMusic.paused) bgMusic.play();
                else bgMusic.pause();
            }
        };

        syncChannel.postMessage({ type: 'PAGE_LOADED', url: 'tool-team.html' });
    </script>
</body>
</html>
